plugins {
    id 'java'
}

group = 'com.poc'
version = '1.0.0-SNAPSHOT'

// Toolchain-only configuration — no sourceCompatibility/targetCompatibility.
// Reproduces UA v26.3.1-hf1 silent dependency resolution failure on Gradle 9.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.apache.commons:commons-lang3:3.14.0'
    implementation 'com.google.guava:guava:33.2.1-jre'
    testImplementation 'junit:junit:4.13.2'
}
